apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: nginx
  name: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  strategy: {}
  template:
    metadata:
      labels:
        app: nginx
    spec:
      automountServiceAccountToken: false
      containers:
      - image: nginx:alpine
        name: nginx
        securityContext:
           allowPrivilegeEscalation: false
           readOnlyRootFilesystem: true
           capabilities:
             drop:
               - ALL
#        resources:
#           requests:
#             cpu: "200m"
#             memory: "16Mi"
#           limits:
#             cpu: "200m"
#             memory: "8Mi"
        startupProbe:
          httpGet:
            path: /
            port: 8080
          periodSeconds: 3
          failureThreshold: 3
          timeoutSeconds: 2
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
        volumeMounts:
          - name: nginx-default-page
            mountPath: /usr/share/nginx/html/index.html
            subPath: index.html
          - name: nginx-stub-status-conf
            mountPath: /etc/nginx/conf.d/default.conf
            subPath: default.conf
          - name: tmp
            mountPath: /tmp
      - name: nginx-exporter
        image: nginx/nginx-prometheus-exporter:1.4.1
        args:
          - -nginx.scrape-uri=http://localhost:8080/stub_status
        ports:
          - containerPort: 9113
            name: metrics
#        resources:
#          requests:
#            cpu: 50m
#            memory: 32Mi
#          limits:
#            cpu: 100m
#            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        livenessProbe:
          httpGet:
            path: /metrics
            port: 9113
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /metrics
            port: 9113
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
        - name: nginx-default-page
          configMap:
            name: nginx-default-page
            items:
              - key: index.html
                path: index.html
        - name: nginx-stub-status-conf
          configMap:
            name: nginx-stub-status-conf
            items:
              - key: default.conf
                path: default.conf
        - name: tmp
          emptyDir: {}
