apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml
  - httproute.yaml
  - nginx-stub-status-conf.yaml
  - servicemonitor.yaml
  - scaledobject.yaml
  - probe.yaml
  - slo-rules.yaml
  # slo-dashboard-configmap.yaml is intentionally NOT here — it carries a fixed
  # dashboard uid, so it must be deployed exactly once (via the dev overlay),
  # not per-overlay. See overlays/dev/kustomization.yaml.

configMapGenerator:
  - name: nginx-default-page
    files:
      - index.html=nginx-default-page/index.html

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: nginx
      app.kubernetes.io/part-of: accor-sre

# Image is set by environment overlays (see overlays/*/kustomization.yaml).
# Base image 'nginx' is a placeholder; each overlay must override it.
