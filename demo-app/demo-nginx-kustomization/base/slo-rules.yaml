# SLO definition for demo-app as Prometheus recording + alerting rules.
#
# SLIs (raw signals from the blackbox Probe, label slo_service="demo-app"):
#   availability = probe_success                (1 = a 2xx response was served)
#   latency      = probe_duration_seconds       (total end-to-end request time)
#
# SLO targets:
#   Availability: 99.5% of probes succeed        (error budget = 0.5%)
#   Latency:      95% of probes  < 300 ms
#
# SLA (external contract): 99.0% availability — looser than the SLO on purpose,
#   so the error-budget burn alerts below fire well before the SLA is breached.
#
# Alerting: Google-SRE multi-window, multi-burn-rate on the availability budget.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: demo-app-slo
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    # ---- Availability SLI: fraction of successful probes per window ----------
    - name: demo-app.slo.availability.sli
      interval: 30s
      rules:
        - record: sli:demo_app_availability:ratio_rate5m
          expr: avg_over_time(probe_success{slo_service="demo-app"}[5m])
        - record: sli:demo_app_availability:ratio_rate30m
          expr: avg_over_time(probe_success{slo_service="demo-app"}[30m])
        - record: sli:demo_app_availability:ratio_rate1h
          expr: avg_over_time(probe_success{slo_service="demo-app"}[1h])
        - record: sli:demo_app_availability:ratio_rate2h
          expr: avg_over_time(probe_success{slo_service="demo-app"}[2h])
        - record: sli:demo_app_availability:ratio_rate6h
          expr: avg_over_time(probe_success{slo_service="demo-app"}[6h])
        - record: sli:demo_app_availability:ratio_rate1d
          expr: avg_over_time(probe_success{slo_service="demo-app"}[1d])
        - record: sli:demo_app_availability:ratio_rate3d
          expr: avg_over_time(probe_success{slo_service="demo-app"}[3d])
        # The SLO target and error budget, published as series for dashboards.
        - record: slo:demo_app_availability:target
          expr: vector(0.995)
        - record: slo:demo_app_availability:error_budget
          expr: vector(0.005)

    # ---- Latency SLI: fraction of probes under the 300ms threshold -----------
    - name: demo-app.slo.latency.sli
      interval: 30s
      rules:
        - record: sli:demo_app_latency_under300ms:ratio_rate5m
          expr: avg_over_time((probe_duration_seconds{slo_service="demo-app"} < bool 0.3)[5m:15s])
        - record: sli:demo_app_latency_under300ms:ratio_rate1h
          expr: avg_over_time((probe_duration_seconds{slo_service="demo-app"} < bool 0.3)[1h:15s])
        - record: slo:demo_app_latency:target
          expr: vector(0.95)

    # ---- Multi-window multi-burn-rate alerts on the availability budget ------
    # Threshold = burn_rate * error_budget(0.005). Both windows must breach.
    - name: demo-app.slo.availability.alerts
      rules:
        - alert: DemoAppAvailabilityErrorBudgetBurnFast
          # 14.4x burn: ~2% of the 30d budget in 1h. Long=1h, short=5m.
          expr: |
            (1 - sli:demo_app_availability:ratio_rate1h) > (14.4 * 0.005)
            and
            (1 - sli:demo_app_availability:ratio_rate5m) > (14.4 * 0.005)
          for: 2m
          labels:
            severity: critical
            slo: demo-app-availability
            burn_rate: fast
          annotations:
            summary: "demo-app burning availability budget fast (14.4x)"
            description: "Availability error rate over 1h and 5m exceeds 14.4x the 99.5% SLO budget. At this rate the 30-day budget is gone in ~2 days."

        - alert: DemoAppAvailabilityErrorBudgetBurnMedium
          # 6x burn: ~5% of the 30d budget in 6h. Long=6h, short=30m.
          expr: |
            (1 - sli:demo_app_availability:ratio_rate6h) > (6 * 0.005)
            and
            (1 - sli:demo_app_availability:ratio_rate30m) > (6 * 0.005)
          for: 5m
          labels:
            severity: critical
            slo: demo-app-availability
            burn_rate: medium
          annotations:
            summary: "demo-app burning availability budget (6x)"
            description: "Availability error rate over 6h and 30m exceeds 6x the 99.5% SLO budget."

        - alert: DemoAppAvailabilityErrorBudgetBurnSlow
          # 3x burn: ~10% of the 30d budget in 1d. Long=1d, short=2h.
          expr: |
            (1 - sli:demo_app_availability:ratio_rate1d) > (3 * 0.005)
            and
            (1 - sli:demo_app_availability:ratio_rate2h) > (3 * 0.005)
          for: 15m
          labels:
            severity: warning
            slo: demo-app-availability
            burn_rate: slow
          annotations:
            summary: "demo-app slowly burning availability budget (3x)"
            description: "Availability error rate over 1d and 2h exceeds 3x the 99.5% SLO budget."

    # ---- Latency SLO alert ---------------------------------------------------
    - name: demo-app.slo.latency.alerts
      rules:
        - alert: DemoAppLatencySLOBreach
          expr: sli:demo_app_latency_under300ms:ratio_rate1h < 0.95
          for: 10m
          labels:
            severity: warning
            slo: demo-app-latency
          annotations:
            summary: "demo-app latency SLO at risk"
            description: "Fewer than 95% of probes over the last 1h completed under 300ms."
