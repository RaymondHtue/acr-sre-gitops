apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ./namespace.yaml
  # Single, namespace-aware SLO dashboard — deployed once here (not in base) so
  # its fixed uid isn't duplicated across the blue/green overlays. The Grafana
  # sidecar reads it cluster-wide (searchNamespace: ALL) and its $namespace var
  # covers testing-.*, so it still shows blue/green data.
  - ./slo-dashboard-configmap.yaml

namespace: testing-dev
nameSuffix: -dev

labels:
  - includeSelectors: true
    pairs:
      environment: dev

patches:
  - path: deployment-patch.yaml
  - patch: |-
      - op: replace
        path: /spec/hostnames/0
        value: "traffic.maunghtoo.cloud"
    target:
      kind: HTTPRoute
  - patch: |-
      - op: replace
        path: /spec/targets/staticConfig/static/0
        value: "https://traffic.maunghtoo.cloud"
    target:
      kind: Probe
  - patch: |-
      - op: replace
        path: /spec/ports/0/targetPort
        value: 8080
    target:
      kind: Service
  - target:
      kind: Deployment
      name:
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/name
        value: nginx-dev
  - target:
      kind: ScaledObject
      name: nginx-scaledobject
    patch: |-
      - op: replace
        path: /spec/scaleTargetRef/name
        value: nginx-dev

replacements:
  - source:
      kind: Service
      name: nginx
      fieldPath: metadata.name
    targets:
      - select:
          kind: HTTPRoute
          name: nginx-http
        fieldPaths:
          - spec.rules.*.backendRefs.*.name
        options:
          create: true

replicas:
  - name: nginx
    count: 1

images:
  - name: nginx
    newName: nginxinc/nginx-unprivileged
    newTag: "alpine3.23-perl"
configMapGenerator:
  - name: nginx-default-page
    behavior: merge
    files:
      - index.html=index.html
