# Default-deny
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nginx-netpol
spec:
  podSelector: {}
#    matchLabels:
#      app.kubernetes.io/name: nginx
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
      - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: default
      - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      # AWS LBC runs the ALB in IP-target mode: health checks and client
      # traffic  comes from the ALB ENIs (VPC CIDR), no namespaceSelector can match them. Without this ipBlock the ALB health
      # check times out -> target unhealthy -> 504. Covers node-IP kubelet
      # probes too.
      - ipBlock:
            cidr: 10.0.0.0/16
      ports:
        - port: 8080
          protocol: TCP
        - port: 80
          protocol: TCP
    # Exporter /metrics on 9113. Prometheus
    # kubelet probes it from the node IP
    - ports:
        - port: 9113
          protocol: TCP
  egress:
    # DNS to CoreDNS in kube-system. The pod otherwise serves static content
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow pods in this namespace to reach the nginx service (intra-namespace).
    # Without this, egress default-deny blocks client->nginx on 80/8080 even
    # though ingress permits it.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: testing-dev
      ports:
        - port: 80
          protocol: TCP
        - port: 8080
          protocol: TCP
