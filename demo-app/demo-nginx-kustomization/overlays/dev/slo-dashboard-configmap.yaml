# Single, namespace-aware Grafana dashboard for the demo-app SLO. Auto-loaded by
# the kube-prometheus-stack grafana sidecar via the grafana_dashboard label
# (searchNamespace: ALL).
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-app-slo-dashboard
  labels:
    grafana_dashboard: "1"
data:
  demo-app-slo.json: |
    {
      "title": "demo-app · SLO / SLI",
      "uid": "demo-app-slo",
      "schemaVersion": 39,
      "editable": true,
      "time": { "from": "now-24h", "to": "now" },
      "refresh": "30s",
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {},
            "hide": 0
          },
          {
            "name": "namespace",
            "label": "Environment",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "${datasource}" },
            "query": "label_values(probe_success{job=\"nginx-blackbox\", slo_service=\"demo-app\", namespace=~\"testing-.*\"}, namespace)",
            "refresh": 2,
            "sort": 1,
            "multi": true,
            "includeAll": true,
            "allValue": "testing-.*",
            "current": { "text": "All", "value": "$__all" }
          }
        ]
      },
      "panels": [
        {
          "type": "stat",
          "title": "Probe up (now)",
          "gridPos": { "h": 5, "w": 6, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "0": { "text": "DOWN", "color": "red" }, "1": { "text": "UP", "color": "green" } } }
              ],
              "thresholds": { "mode": "absolute", "steps": [ { "color": "red", "value": null }, { "color": "green", "value": 1 } ] }
            }
          },
          "options": { "colorMode": "background", "textMode": "value_and_name", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "probe_success{job=\"nginx-blackbox\", slo_service=\"demo-app\", namespace=~\"$namespace\"}",
              "legendFormat": "{{namespace}}"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Availability SLI (30d)",
          "gridPos": { "h": 5, "w": 6, "x": 6, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "decimals": 4,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.99 },
                  { "color": "green", "value": 0.999 }
                ]
              }
            }
          },
          "options": { "textMode": "value_and_name", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "avg_over_time(probe_success{job=\"nginx-blackbox\", slo_service=\"demo-app\", namespace=~\"$namespace\"}[30d])",
              "legendFormat": "{{namespace}}"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Error budget remaining (30d)",
          "gridPos": { "h": 5, "w": 6, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "decimals": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.25 },
                  { "color": "green", "value": 0.5 }
                ]
              }
            }
          },
          "options": { "textMode": "value_and_name", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "1 - ((1 - avg_over_time(probe_success{job=\"nginx-blackbox\", slo_service=\"demo-app\", namespace=~\"$namespace\"}[30d])) / 0.001)",
              "legendFormat": "{{namespace}}"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Latency SLI p95 (1h)",
          "gridPos": { "h": 5, "w": 6, "x": 18, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "decimals": 3,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.15 },
                  { "color": "red", "value": 0.2 }
                ]
              }
            }
          },
          "options": { "textMode": "value_and_name", "reduceOptions": { "calcs": ["lastNotNull"] } },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sli:demo_app_latency_p95:seconds_rate1h{namespace=~\"$namespace\"}",
              "legendFormat": "{{namespace}}"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Availability (5m ratio) per environment vs SLO",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 5 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "percentunit", "min": 0.9, "max": 1 } },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sli:demo_app_availability:ratio_rate5m{namespace=~\"$namespace\"}",
              "legendFormat": "{{namespace}}"
            },
            {
              "refId": "B",
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "slo:demo_app_availability:target",
              "legendFormat": "SLO 99.9%"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Probe latency p50 / p90 (5m) per environment",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 5 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": { "defaults": { "unit": "s" } },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "quantile_over_time(0.9, probe_duration_seconds{job=\"nginx-blackbox\", slo_service=\"demo-app\", namespace=~\"$namespace\"}[5m])",
              "legendFormat": "{{namespace}} p90"
            },
            {
              "refId": "B",
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "quantile_over_time(0.5, probe_duration_seconds{job=\"nginx-blackbox\", slo_service=\"demo-app\", namespace=~\"$namespace\"}[5m])",
              "legendFormat": "{{namespace}} p50"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Availability error-budget burn rate (1h, multiples of budget) per environment",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 13 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 3 },
                  { "color": "red", "value": 14.4 }
                ]
              }
            }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "(1 - sli:demo_app_availability:ratio_rate1h{namespace=~\"$namespace\"}) / 0.001",
              "legendFormat": "{{namespace}}"
            }
          ]
        }
      ]
    }
