apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-karpenter-testing
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx-karpenter-testing
  template:
    metadata:
      labels:
        app: nginx-karpenter-testing
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 0.1
            memory: 8Mi
          limits:
            cpu: 0.2
            memory: 16Mi
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 2
          periodSeconds: 5
