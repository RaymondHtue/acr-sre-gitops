apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nginx-http
spec:
  hostnames:
    - "nginx01.maunghtoo.cloud"
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: external-http-gateway
    namespace: default
    sectionName: http-listener
  rules:
    - backendRefs:
      - group: ''
        kind: Service
        name: nginx
        port: 80
        weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
