# Karpenter Helm values
# Chart: oci://public.ecr.aws/karpenter/karpenter
# Version: 1.3.3
#
# Pod Identity handles AWS credentials — no serviceAccount.annotations needed.
# Ensure aws_eks_pod_identity_association exists (managed by karpenter TF module).

settings:
  clusterName: resilient-eks-redemption-dev
  clusterEndpoint: "https://4451DE56AF9D23B7CD641F0BE1C6A320.gr7.us-east-1.eks.amazonaws.com"
  interruptionQueue: Karpenter-resilient-eks-redemption-dev

# Run Karpenter controller on infra nodes
tolerations:
  - key: node.kubernetes.io/purpose
    operator: Equal
    value: infra
    effect: NoSchedule

nodeSelector:
  node.kubernetes.io/purpose: infra

# Spread across AZs for HA
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: karpenter

replicas: 2

controller:
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

serviceAccount:
  name: karpenter
  create: true
