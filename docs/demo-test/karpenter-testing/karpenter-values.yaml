settings:
  clusterName: accor-resilient-eks-dev
  # interruptionQueue: accor-resilient-eks-dev
  clusterEndpoint: ""  # FIXME: fill from: aws eks describe-cluster --name accor-resilient-eks-dev --query "cluster.endpoint"
  aws:
    defaultInstanceProfile: ""  # FIXME: fill with your Karpenter node instance profile name

serviceAccount:
  create: true
  name: karpenter
  # using EKS Pod Identity (no annotations needed)

# Force pods to schedule ONLY on nodes with this label
nodeSelector:
  node.kubernetes.io/purpose: infra

# Allow pods to schedule on nodes with this taint
tolerations:
  - key: node.kubernetes.io/purpose
    operator: Equal
    value: infra
    effect: NoSchedule

# High Availability (Optional for testing, recommended for production)
replicas: 2

# Explicit region — required when IMDS is unreachable (e.g. EKS Pod Identity)
controller:
  env:
    - name: AWS_REGION
      value: us-east-1
