apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  # amiFamily replaced by amiSelectorTerms alias in v1 API
  amiSelectorTerms:
    - alias: al2023@latest

  role: "accor-resilient-eks-dev-karpenter-node"

  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: accor-resilient-eks-dev

  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: accor-resilient-eks-dev

  tags:
    Project: accor-resilient-eks-dev
    Environment: dev
    ManagedBy: karpenter