# prometheus-blackbox-exporter — synthetic prober used as the SLI source for
# demo-app availability/latency (nginx stub_status can't report status codes or
# points at this exporter's service; targets are the app's public HTTPRoute URL.

fullnameOverride: blackbox-exporter

# Tolerate Karpenter disruption like the rest of the monitoring stack.
tolerations:
  - key: "karpenter.sh/disruption"
    operator: "Exists"
    effect: "NoSchedule"

resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    memory: 64Mi

config:
  modules:
    http_2xx:
      prober: http
      timeout: 5s
      http:
        method: GET
        valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
        valid_status_codes: []        # defaults to 2xx
        follow_redirects: true
        preferred_ip_protocol: "ip4"
        tls_config:
          insecure_skip_verify: false # ALB serves a valid ACM cert

# We create the Probe CR ourselves (in the demo-app kustomize base) so the
# chart's own serviceMonitor/prometheusRule scaffolding stays off.
serviceMonitor:
  enabled: false
prometheusRule:
  enabled: false
