prometheus:
  prometheusSpec:
    retention: 7d
    storageSpec: {}

# ESO resources co-deployed with the stack
extraManifests:
  - apiVersion: external-secrets.io/v1
    kind: ClusterSecretStore
    metadata:
      name: aws-secrets-manager
    spec:
      provider:
        aws:
          service: SecretsManager
          region: us-east-1

  - apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    metadata:
      name: grafana-admin-secret
      namespace: monitoring
    spec:
      refreshInterval: 1h
      secretStoreRef:
        name: aws-secrets-manager
        kind: ClusterSecretStore
      target:
        name: grafana-admin-secret
        creationPolicy: Owner
      data:
        - secretKey: admin-user
          remoteRef:
            key: accor-resilient-eks-dev/grafana
            property: admin-user
        - secretKey: admin-password
          remoteRef:
            key: accor-resilient-eks-dev/grafana
            property: admin-password

  # Gmail SMTP app-password for Alertmanager email notifications.
  # Mounted into the Alertmanager pod via alertmanager.alertmanagerSpec.secrets
  - apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    metadata:
      name: alertmanager-smtp
      namespace: monitoring
    spec:
      refreshInterval: 1h
      secretStoreRef:
        name: aws-secrets-manager
        kind: ClusterSecretStore
      target:
        name: alertmanager-smtp
        creationPolicy: Owner
      data:
        - secretKey: smtp-password
          remoteRef:
            key: accor-resilient-eks-dev/alertmanager-smtp
            property: smtp-password

  # Expose Grafana via Gateway API (wildcard *.maunghtoo.cloud cert on alb-gateway).
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: grafana
      namespace: monitoring
    spec:
      hostnames:
        - "grafana.maunghtoo.cloud"
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: alb-gateway
          namespace: default
          sectionName: https
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: alb-gateway
          namespace: default
          sectionName: http
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - group: ''
              kind: Service
              name: kube-prometheus-stack-grafana
              port: 80
              weight: 1
